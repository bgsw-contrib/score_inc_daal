name: Gitleaks

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Scan repository for leaked secrets
        uses: docker://ghcr.io/gitleaks/gitleaks:latest
        with:
          args: dir --verbose --redact --config=.gitleaks.toml .
